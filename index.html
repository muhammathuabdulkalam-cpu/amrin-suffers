<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>AMRIN Suffers - Magnet Update!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        body{margin:0;overflow:hidden;background:#000;font-family:'Fredoka One',sans-serif;touch-action:none;user-select:none}
        #gameCanvas{display:block;width:100vw;height:100vh}
        #ui-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
        .hud{position:absolute;color:#fff;text-shadow:0 4px 6px rgba(0,0,0,0.9);z-index:10;letter-spacing:2px}
        #score-display{top:25px;right:30px;font-size:36px}
        #coin-counter{top:75px;right:30px;font-size:34px;color:#FFD700;text-shadow:0 0 15px rgba(255,215,0,0.8),0 4px 6px #000}
        #pause-btn{position:absolute;top:25px;left:30px;width:55px;height:55px;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border-radius:15px;border:2px solid rgba(255,255,255,0.5);color:#fff;font-size:28px;line-height:50px;text-align:center;cursor:pointer;pointer-events:auto;z-index:10;transition:.2s}
        #pause-btn:active{transform:scale(0.9)}
        .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto;z-index:100;animation:fadeIn .3s}
        .overlay.pink{background:rgba(255,105,180,0.9);} 
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .panel{background:linear-gradient(135deg,#fff 0%,#f0f0f0 100%);padding:50px;border-radius:30px;text-align:center;min-width:350px;box-shadow:0 30px 60px rgba(0,0,0,0.9),inset 0 4px 0 #fff;border:6px solid #fff;}
        .title{font-size:48px;margin:0 0 20px 0;color:#ff3366;-webkit-text-stroke:2px #900020;text-shadow:4px 4px 0 rgba(0,0,0,0.2);line-height:1.1;letter-spacing:1px}
        .text{font-size:28px;color:#2c3e50;margin:15px 0}
        .btn{font-family:'Fredoka One',sans-serif;background:linear-gradient(to bottom,#00d2ff,#3a7bd5);color:#fff;border:none;padding:20px 50px;font-size:28px;border-radius:50px;cursor:pointer;margin-top:10px;box-shadow:0 8px 0 #20559e,0 15px 20px rgba(58,123,213,0.4);text-transform:uppercase;transition:.1s}
        .btn:active{transform:translateY(8px);box-shadow:0 0 0 #20559e}
        .btn.secondary{background:linear-gradient(to bottom,#ff9966,#ff5e62);box-shadow:0 8px 0 #c0392b}
        .btn.secondary:active{box-shadow:0 0 0 #c0392b}
        .btn.success{background:linear-gradient(to bottom,#2ecc71,#27ae60);box-shadow:0 8px 0 #1e8449}
        .btn.success:active{box-shadow:0 0 0 #1e8449}
        .hidden{display:none !important}
        .float-anim{animation:floating 3s ease-in-out infinite}
        @keyframes floating{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .pop-anim{animation:popIn 0.8s cubic-bezier(0.68,-0.55,0.265,1.55) forwards}
        @keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1j);opacity:1}}
        @media (max-width: 768px) {
            .title{font-size:38px !important; line-height:1.2}
            .panel{min-width:240px; padding:25px; width:80%; max-width:350px;}
            .btn{font-size:22px; padding:15px 25px; width:100%; box-sizing:border-box;}
            #score-display{top:20px; right:20px; font-size:24px;}
            #coin-counter{top:55px; right:20px; font-size:22px;}
            #pause-btn{top:20px; left:20px; width:45px; height:45px; font-size:22px; line-height:40px;}
            #april-fool .title {font-size:32px !important;}
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-container">
        <div id="pause-btn">⏸</div>
        <div id="score-display" class="hud">SCORE: 0</div>
        <div id="coin-counter" class="hud">🪙 0</div>

        <div id="main-menu" class="overlay">
            <div class="panel float-anim">
                <h1 class="title">AMRIN<br><span style="color:#00d2ff;-webkit-text-stroke:2px #0056b3">SUFFERS</span></h1>
                <p class="text" id="menu-high-score">🏆 Highest: 0</p>
                <div style="font-size:16px;color:#888;margin-bottom:15px">💡 Double-Tap screen for Hoverboard!</div>
                <button id="play-btn" class="btn">Tap To Run</button>
            </div>
        </div>

        <div id="april-fool" class="overlay pink hidden">
            <div class="panel float-anim">
                <h1 class="title pop-anim" style="font-size:55px;">April Fool Amrin! 🤪😜</h1>
                <p class="text" style="color:#e84393; font-size:24px;">Did you really think it would be that easy?!</p>
                <button id="real-start-btn" class="btn success hidden">Real Start 🏃‍♀️💨</button>
            </div>
        </div>

        <div id="pause-menu" class="overlay hidden">
            <div class="panel">
                <h1 class="title" style="color:#f39c12;-webkit-text-stroke:2px #d35400">PAUSED</h1>
                <p class="text">Take a breath...</p>
                <button id="resume-btn" class="btn">Resume</button><br>
                <button id="quit-btn" class="btn secondary" style="margin-top:20px;font-size:24px;padding:15px 30px">Quit</button>
            </div>
        </div>

        <div id="game-over" class="overlay hidden">
            <div class="panel float-anim">
                <h1 class="title pop-anim" id="game-over-title" style="color:#ff3366;-webkit-text-stroke:2px #900020;font-size:38px;">Better luck next time!</h1>
                <p class="text" id="final-score" style="font-size:36px;color:#2c3e50">Score: 0</p>
                <p class="text" id="final-coins" style="color:#f39c12;font-size:34px;text-shadow:0 0 10px rgba(243,156,18,0.5)">🪙 Coins: 0</p>
                <p class="text hidden" id="new-record" style="color:#2ecc71;font-size:30px;animation:floating 1.5s infinite">🌟 NEW RECORD! 🌟</p>
                <button id="restart-btn" class="btn">Run Again</button>
            </div>
        </div>
    </div>

    <script>
        const WORLD = {
            LANE_WIDTH: 3.5, TRACK_WIDTH: 15, VISIBLE_Z: 200, DESTROY_Z: 30, CHUNK_LENGTH: 30,
            CAMERA_HEIGHT: 11, CAMERA_Z_OFFSET: 15, PLAYER_Y: 1.0, JUMP_HEIGHT: 6.0, GRAVITY: 36,     
            START_SPEED: 30, MAX_SPEED: 100, ACCELERATION: 0.35, POLICE_OFFSET_Z: 3.5 
        };

        const COLORS = {
            SKY: 0x1A0B2E, FOG: 0xffadc0, RAIL: 0xc8d6e5, BARRIER: 0xff9f43, COIN: 0xffd32a,
            PLAYER: { SKIN: 0xffccaa, HAT: 0xff66b2, SHIRT: 0x9b59b6, PANTS: 0x2c3e50, SHOES: 0xffffff, HAIR: 0x3e2723 },
            COP: { SKIN: 0xe0ac86, HAT: 0x192a56, SHIRT: 0x273c75, PANTS: 0x192a56, SHOES: 0x000000, HAIR: 0x111111 }
        };

        function createTexture(type) {
            const cvs = document.createElement('canvas'); cvs.width = 512; cvs.height = 512; const x = cvs.getContext('2d');
            if (type === 'train') {
                const g = x.createLinearGradient(0,0,0,512); g.addColorStop(0,'#ff7675'); g.addColorStop(1,'#d63031');
                x.fillStyle = g; x.fillRect(0,0,512,512); x.fillStyle = '#2d3436';
                for(let i=0;i<4;i++) x.fillRect(40+(i*120),100,80,150);
                x.fillStyle = '#0984e3'; x.fillRect(0,300,512,40); x.fillStyle = '#ffeaa7'; x.font = "bold 60px 'Fredoka One'"; x.fillText("SUBWAY", 140, 370);
            } else if (type === 'building') {
                x.fillStyle = '#2d3436'; x.fillRect(0,0,512,512); x.fillStyle = '#ffeaa7';
                for(let i=20;i<512;i+=60) for(let j=20;j<512;j+=80) { x.fillStyle = Math.random()<0.4 ? '#ffeaa7' : '#1e272e'; x.fillRect(i,j,40,50); }
            } else if (type === 'track') {
                x.fillStyle='#1e1e1e'; x.fillRect(0,0,512,512);
                for(let i=0;i<5000;i++){ x.fillStyle=Math.random()>0.5?'#111':'#333'; x.fillRect(Math.random()*512,Math.random()*512,3,3);}
                x.fillStyle='#3d2314'; x.fillRect(0,200,512,112); x.fillStyle='#2d180b'; for(let i=0;i<20;i++) x.fillRect(0,200+Math.random()*110,512,2);
            }
            const t = new THREE.CanvasTexture(cvs); t.wrapS = t.wrapT = THREE.RepeatWrapping; if(type==='track') t.repeat.set(1,100); return t;
        }

        function createTextSprite(msg, color) {
            const cvs = document.createElement('canvas'); cvs.width = 300; cvs.height = 80; const x = cvs.getContext('2d');
            x.font = 'bold 36px "Fredoka One"'; x.textAlign = 'center'; x.strokeStyle = '#000'; x.lineWidth = 6;
            x.strokeText(msg, 150, 50); x.fillStyle = color; x.fillText(msg, 150, 50);
            const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cvs), transparent: true }));
            s.scale.set(2.5, 0.65, 1); return s;
        }

        const TEX = { TRAIN: createTexture('train'), BLDG: createTexture('building'), GROUND: createTexture('track') };

        class InputHandler {
            constructor() {
                this.actionQueue = []; this.tsX=0; this.tsY=0; this.thr=40; this.keys = new Set();
                this.lastTap = 0; this.lastSpace = 0;
                window.addEventListener('keydown', (e) => { 
                    if(e.code==='Space') { const n = Date.now(); if(n-this.lastSpace<300) this.pushAction('BOARD'); this.lastSpace=n; }
                    if(this.keys.has(e.code)) return; this.keys.add(e.code); this.handleKey(e.code); 
                });
                window.addEventListener('keyup', (e) => this.keys.delete(e.code));
                window.addEventListener('touchstart', (e) => { 
                    this.tsX=e.touches[0].screenX; this.tsY=e.touches[0].screenY; 
                    const n = Date.now(); if(n-this.lastTap<300) this.pushAction('BOARD'); this.lastTap=n;
                });
                window.addEventListener('touchend', (e) => this.handleSwipe(this.tsX, this.tsY, e.changedTouches[0].screenX, e.changedTouches[0].screenY));
            }
            handleKey(c) {
                if(c==='ArrowLeft'||c==='KeyA') this.pushAction('LEFT'); else if(c==='ArrowRight'||c==='KeyD') this.pushAction('RIGHT');
                else if(c==='ArrowUp'||c==='KeyW'||c==='Space') this.pushAction('JUMP'); else if(c==='ArrowDown'||c==='KeyS') this.pushAction('SLIDE');
                else if(c==='Escape'||c==='KeyP') this.pushAction('PAUSE');
            }
            handleSwipe(sx, sy, ex, ey) {
                const dx=ex-sx, dy=ey-sy;
                if(Math.abs(dx)>Math.abs(dy)){if(Math.abs(dx)>this.thr) this.pushAction(dx>0?'RIGHT':'LEFT');}
                else {if(Math.abs(dy)>this.thr) this.pushAction(dy<0?'JUMP':'SLIDE');}
            }
            pushAction(a) { this.actionQueue.push({ a, t: Date.now() }); this.actionQueue = this.actionQueue.filter(x=>Date.now()-x.t<200); }
            consumeAction() { return this.actionQueue.shift(); }
            clearQueue() { this.actionQueue = []; }
        }

        class ParticleSystem {
            constructor(scene) { this.scene = scene; this.particles = []; this.geometry = new THREE.BoxGeometry(0.2,0.2,0.2); this.mats = {}; }
            emit(pos, count, color, type='burst') {
                if(!this.mats[color]) this.mats[color] = new THREE.MeshBasicMaterial({ color: color });
                const mat = this.mats[color];
                for(let i=0;i<count;i++){
                    const m = new THREE.Mesh(this.geometry, mat); m.position.copy(pos); this.scene.add(m);
                    let v = type==='burst'?new THREE.Vector3((Math.random()-.5)*12,(Math.random()*12)+5,(Math.random()-.5)*12):new THREE.Vector3((Math.random()-.5)*4,Math.random()*3,Math.random()*5+5);
                    if(type==='dust'){m.position.y=0.2; m.scale.setScalar(Math.random()*2+0.5);}
                    this.particles.push({m, v, life:1.0, decay:Math.random()*1.5+1});
                }
            }
            update(dt) {
                for(let i=this.particles.length-1;i>=0;i--){
                    const p = this.particles[i]; p.life-=p.decay*dt;
                    if(p.life<=0){this.scene.remove(p.m); this.particles.splice(i,1); continue;}
                    p.m.position.addScaledVector(p.v, dt); p.v.y -= WORLD.GRAVITY*0.5*dt;
                    p.m.scale.setScalar(Math.max(p.life,0)); p.m.rotation.x+=dt*10; p.m.rotation.y+=dt*10;
                }
            }
            clear() { this.particles.forEach(p=>this.scene.remove(p.m)); this.particles=[]; }
        }

        class Character {
            constructor(scene, colors, isPolice, name) {
                this.group = new THREE.Group(); this.modelGroup = new THREE.Group();
                this.group.add(this.modelGroup); this.group.position.y = WORLD.PLAYER_Y; scene.add(this.group);
                
                const m = (geo, col)=>new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color:col, roughness:0.8}));
                this.head = m(new THREE.SphereGeometry(isPolice?.4:.33,32,32), colors.SKIN); this.head.position.y=isPolice?1.7:1.6;
                this.hat = m(new THREE.CylinderGeometry(isPolice?.36:.32, isPolice?.36:.32,0.2,32), colors.HAT); this.hat.position.y=0.3;
                this.hatBill = m(new THREE.BoxGeometry(0.4,0.05,0.4), colors.HAT); this.hatBill.position.set(0,-0.05,0.25); this.hat.add(this.hatBill);
                this.head.add(this.hat);
                
                if(!isPolice) { const p = m(new THREE.SphereGeometry(0.2,16,16), colors.HAIR); p.position.set(0,-0.1,-0.3); p.scale.z=1.5; this.head.add(p); }
                this.body = m(new THREE.CylinderGeometry(isPolice?.3:.25, isPolice?.25:.2, isPolice?.9:.8, 16), colors.SHIRT); this.body.position.y = isPolice?1.0:0.9;
                
                const mkLimb = (rad, xOff) => {
                    const g=new THREE.Group(); g.position.set(xOff, 1.2, 0); const lm=m(new THREE.CylinderGeometry(rad,rad,0.6,16), colors.SKIN); lm.position.y=-0.3; g.add(lm); return g;
                };
                const mkLeg = (rad, xOff) => {
                    const g=new THREE.Group(); g.position.set(xOff, 0.5, 0); const lm=m(new THREE.CylinderGeometry(rad,rad-0.02,0.6,16), colors.PANTS); lm.position.y=-0.3; 
                    const sh=m(new THREE.BoxGeometry(0.2,0.15,0.3), colors.SHOES); sh.position.set(0,-0.6,0.05); g.add(lm,sh); return g;
                };
                
                this.lArm = mkLimb(isPolice?.08:.06, -0.35); this.rArm = mkLimb(isPolice?.08:.06, 0.35);
                this.lLeg = mkLeg(isPolice?.12:.09, -0.15); this.rLeg = mkLeg(isPolice?.12:.09, 0.15);
                this.modelGroup.add(this.head, this.body, this.lArm, this.rArm, this.lLeg, this.rLeg);
                this.modelGroup.traverse(c=>{if(c.isMesh) c.castShadow=true;});
                if(name) { this.nameTag = createTextSprite(name, isPolice?"#ff3366":"#2196F3"); this.nameTag.position.y=2.4; this.group.add(this.nameTag); }
            }
            animateRun(speed) {
                const t = Date.now()*0.015*(speed/30);
                this.lLeg.rotation.x=Math.sin(t)*0.9; this.rLeg.rotation.x=Math.sin(t+Math.PI)*0.9;
                this.lArm.rotation.x=Math.sin(t+Math.PI)*0.9; this.rArm.rotation.x=Math.sin(t)*0.9;
                this.modelGroup.position.y=Math.abs(Math.sin(t*2))*0.15;
            }
        }

        class Player extends Character {
            constructor(scene, particles) {
                super(scene, COLORS.PLAYER, false, "AMRIN"); this.particles = particles;
                this.lane = 0; this.state = 'RUNNING'; this.yVel = 0; this.slideTimer = 0;
                this.targetX = 0; this.currentX = 0; this.baseY = WORLD.PLAYER_Y; this.collisionBox = new THREE.Box3();
                this.updateHitbox();
                
                this.board = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.1,1.4), new THREE.MeshStandardMaterial({color:0x00d2ff, emissive:0x00d2ff, emissiveIntensity:0.6}));
                this.board.position.y = -0.55; this.board.visible = false;
                this.group.add(this.board); this.hasBoard = false; this.boardTimer = 0;
                this.hasMagnet = false; this.magTimer = 0;
            }
            updateHitbox() { this.collisionBox.setFromObject(this.modelGroup).expandByVector(new THREE.Vector3(-0.25,-0.1,-0.15)); }
            
            toggleBoard() { 
                if(!this.hasBoard) { 
                    this.hasBoard=true; this.board.visible=true; this.boardTimer=20; this.particles.emit(this.group.position,20,0x00d2ff,'burst'); 
                    let p=document.createElement('div'); p.innerHTML='🛹 SKATEBOARD!'; p.style.cssText=`position:absolute;color:#00d2ff;font-size:36px;font-family:'Fredoka One';text-shadow:0 0 10px #000;left:50%;top:25%;transform:translateX(-50%);pointer-events:none;animation:popIn 0.5s forwards`; document.body.appendChild(p); setTimeout(()=>p.remove(),800);
                } 
            }
            breakBoard() { 
                this.hasBoard=false; this.board.visible=false; this.particles.emit(this.group.position,50,0x00d2ff,'burst'); 
                let p=document.createElement('div'); p.innerHTML='💥 SAVED!'; p.style.cssText=`position:absolute;color:#ff3366;font-size:42px;font-family:'Fredoka One';text-shadow:0 0 10px #000;left:50%;top:40%;transform:translateX(-50%);pointer-events:none;animation:popIn 0.5s forwards`; document.body.appendChild(p); setTimeout(()=>p.remove(),800);
            }

            jump() { if (this.state==='RUNNING') { this.state='JUMPING'; this.yVel=Math.sqrt(2*WORLD.GRAVITY*WORLD.JUMP_HEIGHT); this.particles.emit(this.group.position,10,0xffffff,'dust'); } }
            slide() { 
                if (this.state==='JUMPING') this.yVel=-WORLD.GRAVITY*1.5; 
                this.state='SLIDING'; this.slideTimer=0.7; this.modelGroup.scale.y=0.45; this.modelGroup.position.y=-0.4; this.head.rotation.x=Math.PI/4; 
            }
            changeLane(dir) { 
                if(dir==='LEFT'&&this.lane>-1){this.lane--;this.group.rotation.z=0.2;} 
                if(dir==='RIGHT'&&this.lane<1){this.lane++;this.group.rotation.z=-0.2;} this.targetX=this.lane*WORLD.LANE_WIDTH; 
            }
            update(dt, speed) {
                if(this.state==='CRASHED') return;
                this.currentX+=(this.targetX-this.currentX)*15*dt; this.group.position.x=this.currentX; this.group.rotation.z+=(0-this.group.rotation.z)*10*dt;
                
                if(this.hasBoard){ this.boardTimer-=dt; this.board.rotation.y = Math.sin(Date.now()*0.01)*0.2; this.particles.emit(this.group.position.clone().add(new THREE.Vector3(0,-0.5,0)), 1, 0x00d2ff, 'dust'); 
                   if(this.boardTimer<=0) this.breakBoard(); 
                }

                if(this.hasMagnet) {
                    this.magTimer -= dt;
                    if(this.magTimer <= 0) this.hasMagnet = false;
                }

                if(this.state==='JUMPING'||this.group.position.y>this.baseY){
                    this.group.position.y+=this.yVel*dt; this.yVel-=WORLD.GRAVITY*dt;
                    if(this.group.position.y<=this.baseY && this.state!=='SLIDING'){ this.group.position.y=this.baseY; this.yVel=0; this.state='RUNNING'; this.particles.emit(this.group.position,15,0xffffff,'dust'); }
                }
                if(this.group.position.y>WORLD.PLAYER_Y && this.baseY===WORLD.PLAYER_Y && this.state==='RUNNING'){ this.state='JUMPING'; this.yVel=0; }
                
                if(this.state==='SLIDING'){
                    this.slideTimer-=dt; this.lLeg.rotation.x=this.rLeg.rotation.x=Math.PI/2; this.lArm.rotation.x=this.rArm.rotation.x=-Math.PI/2;
                    if(Math.random()<0.3) this.particles.emit(this.group.position.clone().add(new THREE.Vector3(0,-0.5,0)),2,0xffffff,'dust');
                    if(this.slideTimer<=0){ this.state='RUNNING'; this.modelGroup.scale.y=1; this.modelGroup.position.y=0; this.head.rotation.x=0; }
                } else if(this.state==='RUNNING'){ this.animateRun(this.hasBoard?speed*1.2:speed); }
                else if(this.state==='JUMPING'){ this.lLeg.rotation.x=-0.2; this.rLeg.rotation.x=0.5; this.lArm.rotation.x=this.rArm.rotation.x=Math.PI/2; }
                this.updateHitbox();
            }
            reset() {
                this.state='RUNNING'; this.lane=0; this.targetX=0; this.currentX=0; this.group.position.set(0,WORLD.PLAYER_Y,0); this.group.rotation.set(0,0,0);
                this.baseY=WORLD.PLAYER_Y; this.modelGroup.scale.y=1; this.head.rotation.x=0; this.yVel=0; 
                this.hasMagnet = false; if(this.hasBoard)this.breakBoard();
            }
        }

        class WorldManager {
            constructor(scene, particles) {
                this.scene=scene; this.particles=particles; this.obstacles=[]; this.coins=[]; this.decorations=[]; this.zOff=0;
                this.chunksSpawned = 0;
                this.bldgGeo = new THREE.BoxGeometry(1,1,1); 
                this.magGeo = new THREE.TorusGeometry(0.5, 0.2, 8, 16); // Magnet mesh!
                this.matRail=new THREE.MeshStandardMaterial({color:COLORS.RAIL, metalness:0.8}); this.matBarrier=new THREE.MeshStandardMaterial({color:COLORS.BARRIER, roughness:0.7});
                this.matCoin=new THREE.MeshStandardMaterial({color:COLORS.COIN, metalness:1, roughness:0.1, emissive:COLORS.COIN, emissiveIntensity:0.4});
                this.matMag=new THREE.MeshStandardMaterial({color:0xff0000, emissive:0x660000, metalness:0.5}); // Red magnet!
                this.coinGeo=new THREE.CylinderGeometry(0.4,0.4,0.1,24); this.coinGeo.rotateX(Math.PI/2);
                this.matMapTrain=new THREE.MeshStandardMaterial({map:TEX.TRAIN, metalness:0.6}); this.matMapBldg=new THREE.MeshStandardMaterial({map:TEX.BLDG}); this.matMapGround=new THREE.MeshStandardMaterial({map:TEX.GROUND});
                const g=new THREE.Mesh(new THREE.PlaneGeometry(WORLD.TRACK_WIDTH*10, WORLD.VISIBLE_Z*2), this.matMapGround); g.rotation.x=-Math.PI/2; g.receiveShadow=true; scene.add(g); this.ground=g;
                for(let l=-1;l<=1;l++)[-0.7,0.7].forEach(xOff=>{const r=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,WORLD.VISIBLE_Z*2),this.matRail); r.position.set(l*WORLD.LANE_WIDTH+xOff,0.1,0); r.receiveShadow=true; scene.add(r);});
            }
            spawnChunk(zPos) {
                this.chunksSpawned++;
                const spW = (side) => { const w=Math.random()*5+5, h=Math.random()*30+15, d=Math.random()*10+5, m=new THREE.Mesh(this.bldgGeo, this.matMapBldg); m.scale.set(w,h,d); m.position.set(side==='l'?-(WORLD.TRACK_WIDTH/2+w/2+2):(WORLD.TRACK_WIDTH/2+w/2+2), h/2, zPos); m.castShadow=m.receiveShadow=true; this.scene.add(m); this.decorations.push(m); };
                if(Math.random()<0.6) spW('l'); if(Math.random()<0.6) spW('r');
                let r=Math.random(), l=Math.floor(Math.random()*3)-1;
                
                // EXACTLY 3 SECONDS = 2 chunks empty gaps!
                if(this.chunksSpawned <= 2) return;

                // Immediately drop heavy trains starting right at chunk 3!
                if (r < 0.08) { 
                    this.spB(l,zPos); this.spC(l===0?1:0,zPos,5,true); // 8% single barrier
                } else if(r < 0.38) { 
                    [-1,0,1].forEach(x=>{if(x!==l)this.spB(x,zPos);else this.spC(x,zPos,4);}); // 30% double barrier
                } else if(r < 0.90) { 
                    // 52% massive train chance immediately!
                    // Moving trains chance scales up extremely fast!
                    this.spT(l,zPos,Math.random() < Math.min(0.6, (this.chunksSpawned-2) * 0.04)); 
                    if(Math.random()<0.8) this.spC(l,zPos-5,4,4.5); 
                } else { 
                    this.spO(l,zPos); this.spC(l,zPos,3,0.5); // 10% slide
                }

                // Randomly spawn a Magnet anywhere!
                if(Math.random() < 0.08) this.spMag(Math.floor(Math.random()*3)-1, zPos - 15);
            }

            spB(l,z) {
                const g=new THREE.Group(), m=new THREE.Mesh(new THREE.BoxGeometry(2.4,1.2,0.6),this.matBarrier); m.position.y=0.6; m.castShadow=m.receiveShadow=true;
                const w=new THREE.MeshStandardMaterial({color:0xffffff}), s1=new THREE.Mesh(new THREE.BoxGeometry(.3,1.25,.65),w), s2=s1.clone(); s1.position.set(-.6,.6,0); s2.position.set(.6,.6,0);
                g.add(m,s1,s2); g.position.set(l*WORLD.LANE_WIDTH,0,z); this.scene.add(g);
                this.obstacles.push({mesh:g, box:new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(l*WORLD.LANE_WIDTH, 0.6, z), new THREE.Vector3(2.4,1.2,0.6)), type:'barrier'});
            }
            spT(l,z, isM) {
                const g=new THREE.Group(), b=new THREE.Mesh(new THREE.BoxGeometry(2.8,3.8,14),this.matMapTrain); b.position.y=2.0; b.castShadow=b.receiveShadow=true;
                const w=new THREE.Mesh(new THREE.PlaneGeometry(2.4,1.5),new THREE.MeshStandardMaterial({color:0x111,metalness:0.9,roughness:0.1})); w.position.set(0,2.5,7.01);
                g.add(b,w); g.position.set(l*WORLD.LANE_WIDTH,0,z-7); this.scene.add(g);
                this.obstacles.push({mesh:g, box:new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(l*WORLD.LANE_WIDTH, 2.0, z-7), new THREE.Vector3(2.8,4,14)), type:'train', isM:isM});
            }
            spO(l,z) {
                const g=new THREE.Group(), b=new THREE.Mesh(new THREE.BoxGeometry(3.5,0.8,0.5),this.matBarrier); b.position.y=2.4; b.castShadow=true;
                const p=new THREE.MeshStandardMaterial({color:0x7f8c8d}), p1=new THREE.Mesh(new THREE.BoxGeometry(.3,2.8,.3),p), p2=p1.clone(); p1.position.set(-1.6,1.4,0); p2.position.set(1.6,1.4,0); p1.castShadow=p2.castShadow=true;
                g.add(b,p1,p2); g.position.set(l*WORLD.LANE_WIDTH,0,z); this.scene.add(g);
                this.obstacles.push({mesh:g, box:new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(l*WORLD.LANE_WIDTH, 2.4, z), new THREE.Vector3(3.5,0.8,0.5)), type:'slide'});
            }
            spC(l,z,c,arc=false,y=1) {
                for(let i=0;i<c;i++){
                    const h=arc?(1-Math.pow((i/(c-1))*2-1,2))*3+1.0:y, m=new THREE.Mesh(this.coinGeo,this.matCoin); m.position.set(l*WORLD.LANE_WIDTH,h,z-(arc?i*2:i*2.5)); m.castShadow=true; this.scene.add(m);
                    this.coins.push({mesh:m, box:new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(l*WORLD.LANE_WIDTH, h, z-(arc?i*2:i*2.5)), new THREE.Vector3(1,1,1)), col:false, yBase:h, isMag:false});
                }
            }
            spMag(l,z) {
                const m = new THREE.Mesh(this.magGeo, this.matMag); m.position.set(l*WORLD.LANE_WIDTH, 1.2, z); m.castShadow=true; this.scene.add(m);
                this.coins.push({mesh:m, box:new THREE.Box3().setFromCenterAndSize(m.position.clone(), new THREE.Vector3(1.5,1.5,1.5)), col:false, yBase:1.2, isMag:true});
            }

            update(dt, speed, player) {
                const md = speed*dt; this.zOff -= md; this.ground.position.z += md; if(this.ground.position.z > WORLD.VISIBLE_Z/2) this.ground.position.z -= WORLD.VISIBLE_Z/2;
                [this.obstacles, this.decorations].forEach(arr => {
                    for(let i=arr.length-1;i>=0;i--) {
                        let o=arr[i], d=o.isM?(speed*1.8*dt):md; o.mesh?o.mesh.position.z+=d:o.position.z+=d; o.mesh&&o.box.translate(new THREE.Vector3(0,0,d));
                        if((o.mesh?o.mesh.position.z:o.position.z) > WORLD.DESTROY_Z) { this.scene.remove(o.mesh||o); arr.splice(i,1); }
                    }
                });
                const t=Date.now()*0.005;
                for(let i=this.coins.length-1;i>=0;i--){
                    let c=this.coins[i]; if(c.col){this.scene.remove(c.mesh);this.coins.splice(i,1);continue;}
                    c.mesh.position.z+=md;
                    
                    // MAGNETIC PULL
                    if(player && player.hasMagnet && !c.isMag) {
                        const dist = c.mesh.position.distanceTo(player.group.position);
                        if(Math.abs(c.mesh.position.z - player.group.position.z) < 25) { 
                            const dir = new THREE.Vector3().subVectors(player.group.position, c.mesh.position).normalize();
                            c.mesh.position.addScaledVector(dir, 50 * dt); // Aggressive vacuum effect!
                            c.box.setFromCenterAndSize(c.mesh.position, new THREE.Vector3(1,1,1));
                        }
                    } else {
                        c.mesh.position.y=c.yBase+Math.sin(t+i)*0.2; c.box.min.y=c.mesh.position.y-0.5; c.box.max.y=c.mesh.position.y+0.5;
                        c.box.translate(new THREE.Vector3(0,0,md));
                    }
                    c.mesh.rotation.y+=4*dt; c.mesh.rotation.x+=c.isMag?2*dt:0; // magnet spins!
                    
                    if(c.mesh.position.z>WORLD.DESTROY_Z){this.scene.remove(c.mesh);this.coins.splice(i,1);}
                }
                if(!this.lz || this.lz > this.zOff-WORLD.VISIBLE_Z) { this.spawnChunk((this.lz||0)-WORLD.CHUNK_LENGTH); this.lz=(this.lz||0)-WORLD.CHUNK_LENGTH; }
            }
            checkCol(plr) {
                let ot=false;
                for(let i=0; i<this.obstacles.length; i++) {
                    const o=this.obstacles[i];
                    if(plr.collisionBox.intersectsBox(o.box)){
                        if(o.type==='train' && plr.yVel<=0 && plr.collisionBox.min.y+0.6 >= o.box.max.y){
                            plr.baseY=o.box.max.y+0.1; plr.group.position.y=plr.baseY; plr.yVel=0; plr.state='RUNNING'; ot=true; continue;
                        }
                        return {hit:true, idx:i}; 
                    }
                }
                if(!ot && plr.baseY>WORLD.PLAYER_Y) plr.baseY=WORLD.PLAYER_Y;
                let cCol=0;
                for(let c of this.coins) if(!c.col && plr.collisionBox.intersectsBox(c.box)){
                    c.col=true; 
                    if(c.isMag) {
                        plr.hasMagnet = true; plr.magTimer = 15;
                        let p=document.createElement('div'); p.innerHTML='🧲 MAGNET!'; p.style.cssText=`position:absolute;color:#ff3366;font-size:36px;font-family:'Fredoka One';text-shadow:0 0 10px #000;left:50%;top:30%;transform:translateX(-50%);pointer-events:none;animation:popIn 0.5s forwards`; document.body.appendChild(p); setTimeout(()=>p.remove(),800);
                        this.particles.emit(c.mesh.position,20,0xff0000,'burst');
                    } else {
                        cCol++; this.particles.emit(c.mesh.position,12,COLORS.COIN,'burst');
                        let p=document.createElement('div'); p.innerHTML='+10'; p.style.cssText=`position:absolute;color:#FFD700;font-size:30px;font-family:'Fredoka One';text-shadow:0 0 10px #000;left:50%;top:40%;pointer-events:none;animation:popIn 0.5s forwards`; document.body.appendChild(p); setTimeout(()=>p.remove(),500);
                    }
                }
                return {hit:false, coins:cCol};
            }
            reset() { 
                this.obstacles.forEach(o=>this.scene.remove(o.mesh)); this.coins.forEach(c=>this.scene.remove(c.mesh)); this.decorations.forEach(d=>this.scene.remove(d)); 
                this.obstacles=[]; this.coins=[]; this.decorations=[]; this.zOff=this.lz=0; 
                this.chunksSpawned=0;
                for(let i=1;i<=8;i++){this.spawnChunk(-i*WORLD.CHUNK_LENGTH);this.lz=-i*WORLD.CHUNK_LENGTH;} 
            }
        }

        class SubwaySurfersGame {
            constructor() {
                this.state = 'MENU'; this.score = 0; this.coins = 0; this.speed = WORLD.START_SPEED;
                this.highScore = localStorage.getItem('amrinHighScore') || 0;
                document.getElementById('menu-high-score').innerText = `🏆 Highest: ${this.highScore}`;
                this.initThree(); this.input = new InputHandler(); this.particles = new ParticleSystem(this.scene);
                this.player = new Player(this.scene, this.particles); 
                this.police = new Character(this.scene, COLORS.COP, true, "AFZAL"); this.police.group.position.set(0, WORLD.PLAYER_Y, WORLD.POLICE_OFFSET_Z);
                this.world = new WorldManager(this.scene, this.particles); this.clock = new THREE.Clock();

                document.getElementById('play-btn').addEventListener('click', () => {
                    document.getElementById('main-menu').classList.add('hidden');
                    document.getElementById('april-fool').classList.remove('hidden');
                    setTimeout(() => { document.getElementById('real-start-btn').classList.remove('hidden'); }, 2000);
                });
                document.getElementById('real-start-btn').addEventListener('click', () => this.start());

                document.getElementById('restart-btn').addEventListener('click', ()=>this.start());
                ['pause-btn','resume-btn'].forEach(id => document.getElementById(id).addEventListener('click', ()=>this.togglePause()));
                document.getElementById('quit-btn').addEventListener('click', ()=>this.quitToMenu());
                window.addEventListener('resize', () => { 
                    const aspect = window.innerWidth/window.innerHeight;
                    this.camera.aspect = aspect; this.camera.fov = aspect < 1 ? 85 : 65; 
                    this.camera.updateProjectionMatrix(); this.renderer.setSize(window.innerWidth, window.innerHeight); 
                });
                document.addEventListener('visibilitychange', () => { if(document.hidden && this.state === 'PLAYING') this.togglePause(); });
                this.animate(); this.world.reset();
            }
            initThree() {
                this.renderer = new THREE.WebGLRenderer({canvas: document.getElementById('gameCanvas'), antialias: true, powerPreference: "high-performance"});
                this.renderer.setSize(window.innerWidth, window.innerHeight); this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true; this.renderer.shadowMap.type = THREE.PCFSoftShadowMap; this.scene = new THREE.Scene(); this.scene.background = new THREE.Color(COLORS.SKY); this.scene.fog = new THREE.FogExp2(COLORS.FOG, 0.006); 
                const asp = window.innerWidth/window.innerHeight;
                this.camera = new THREE.PerspectiveCamera(asp < 1 ? 85 : 65, asp, 0.1, 400); this.camera.position.set(0, WORLD.CAMERA_HEIGHT, WORLD.CAMERA_Z_OFFSET);
                this.scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
                const dLight = new THREE.DirectionalLight(0xffffff, 1.0); dLight.position.set(-20, 50, 20); dLight.castShadow = true;
                dLight.shadow.mapSize.width = dLight.shadow.mapSize.height = 2048; dLight.shadow.camera.near = 0.5; dLight.shadow.camera.far = 150;
                dLight.shadow.camera.left = dLight.shadow.camera.bottom = -40; dLight.shadow.camera.right = dLight.shadow.camera.top = 40; this.scene.add(dLight);
            }
            start() {
                ['april-fool', 'game-over', 'pause-menu'].forEach(id=>document.getElementById(id).classList.add('hidden'));
                document.getElementById('pause-btn').classList.remove('hidden');
                this.state = 'PLAYING'; this.score = this.coins = 0; this.speed = WORLD.START_SPEED;
                this.police.group.position.set(0, WORLD.PLAYER_Y, WORLD.POLICE_OFFSET_Z);
                this.updateHud(); this.player.reset(); this.world.reset(); this.particles.clear(); this.input.clearQueue();
            }
            togglePause() {
                if(this.state === 'PLAYING') { this.state = 'PAUSED'; document.getElementById('pause-menu').classList.remove('hidden'); document.getElementById('pause-btn').classList.add('hidden'); }
                else if(this.state === 'PAUSED') { this.state = 'PLAYING'; document.getElementById('pause-menu').classList.add('hidden'); document.getElementById('pause-btn').classList.remove('hidden'); this.input.clearQueue(); this.clock.getDelta(); }
            }
            quitToMenu() { this.state = 'MENU'; document.getElementById('pause-menu').classList.add('hidden'); document.getElementById('pause-btn').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); this.player.reset(); }
            crash() {
                this.state = 'GAME_OVER'; this.player.state = 'CRASHED'; document.getElementById('pause-btn').classList.add('hidden');
                this.particles.emit(this.player.group.position, 40, 0xff3366, 'burst'); this.police.group.position.z = this.player.group.position.z + 2;
                let s=0, oy=this.camera.position.y; let shk = setInterval(()=>{ this.camera.position.set((Math.random()-0.5)*2, oy+(Math.random()-0.5)*2, this.camera.position.z); if(++s>15){ clearInterval(shk); this.camera.position.set(0,oy,this.camera.position.z);} }, 30);
                let isNew = false; let fs = Math.floor(this.score); if(fs > this.highScore) { this.highScore = fs; localStorage.setItem('amrinHighScore', fs); isNew = true; }
                setTimeout(() => {
                    document.getElementById('game-over').classList.remove('hidden');
                    let ds=0, c=setInterval(()=>{ ds+=Math.max(1,Math.floor(fs/30)); if(ds>=fs){ds=fs; clearInterval(c);} document.getElementById('final-score').innerText = `Score: ${ds}`; },30);
                    document.getElementById('final-coins').innerText = `🪙 Coins: ${this.coins}`;
                    document.getElementById('new-record').classList.toggle('hidden', !isNew); document.getElementById('menu-high-score').innerText = `🏆 Highest: ${this.highScore}`;
                }, 1000);
            }
            update(dt) {
                if(dt>0.1) dt=0.1; const act = this.input.consumeAction();
                if(act) {
                    if(act.a === 'PAUSE') this.togglePause(); else if(act.a === 'LEFT') this.player.changeLane('LEFT');
                    else if(act.a === 'RIGHT') this.player.changeLane('RIGHT'); else if(act.a === 'JUMP') this.player.jump();
                    else if(act.a === 'SLIDE') this.player.slide(); else if(act.a === 'BOARD') this.player.toggleBoard();
                }
                if(this.speed < WORLD.MAX_SPEED) this.speed += WORLD.ACCELERATION*dt; this.score += (this.player.hasBoard?this.speed*1.2:this.speed)*dt;
                
                this.player.update(dt, this.speed); 
                
                // PASSING PLAYER TO THE WORLD MANAGER!! THIS IS THE MAGNET FIX!
                this.world.update(dt, this.speed, this.player); 

                this.particles.update(dt);
                
                this.police.group.position.x += (this.player.group.position.x - this.police.group.position.x) * 6 * dt;
                this.police.group.position.y = this.player.group.position.y; this.police.animateRun(this.speed);
                const tgtZ = WORLD.POLICE_OFFSET_Z + (this.speed - WORLD.START_SPEED) * 0.1;
                this.police.group.position.z += (tgtZ - this.police.group.position.z) * 2 * dt;

                this.camera.position.z += (WORLD.CAMERA_Z_OFFSET - (this.speed*0.06) - this.camera.position.z)*2*dt;
                this.camera.position.x += (this.player.group.position.x*0.4 - this.camera.position.x)*5*dt;
                this.camera.lookAt(new THREE.Vector3(this.player.group.position.x*0.5, WORLD.PLAYER_Y+0.5, this.player.group.position.z-20));
                
                const cr = this.world.checkCol(this.player);
                if(cr.hit) {
                    if(this.player.hasBoard) {
                        this.player.breakBoard();
                        const obMesh = this.world.obstacles[cr.idx].mesh;
                        this.scene.remove(obMesh);
                        this.world.obstacles.splice(cr.idx, 1);
                    } else {
                        this.crash();
                    }
                } else if(cr.coins>0) { this.coins += cr.coins; this.score += cr.coins*15; }
                this.updateHud();
            }
            updateHud() { document.getElementById('score-display').innerText=`SCORE: ${Math.floor(this.score)}`; document.getElementById('coin-counter').innerText=`🪙 ${this.coins}`; }
            animate() {
                requestAnimationFrame(()=>this.animate()); const dt = this.clock.getDelta();
                if(this.state === 'PLAYING') this.update(dt);
                else if(this.state === 'MENU') { this.world.update(dt, WORLD.START_SPEED*0.5); this.player.update(dt, WORLD.START_SPEED*0.5); this.camera.lookAt(0,2,-20); }
                this.renderer.render(this.scene, this.camera);
            }
        }
        window.onload = () => new SubwaySurfersGame();
    </script>
</body>
</html>
